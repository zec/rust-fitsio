name: Test the package

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'bin/**'
      - 'fitsio/**'
      - 'fitsio-derive/**'
      - 'fitsio-sys/**'
      - 'testdata/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Cross.toml'
      - 'rust-toolchain.toml'
      - '.github/workflows/*.yml'

# Only one pull-request triggered run should be executed at a time
# (head_ref is only set for PR events, otherwise fallback to run_id which differs for every run).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linux-armv7:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          target: armv7-unknown-linux-gnueabihf

      # workaround https://github.com/cross-rs/cross/issues/1177
      - name: Install cargo cross
        run: |
          cargo install cross --locked

      - name: cargo generate-lockfile
        # enable this ci template to run regardless of whether the lockfile is checked in or not
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

#      - name: Install cmake and ARM libraries
#        run: |
#          sudo dpkg --add-architecture armhf && \
#          sudo apt-get update && sudo apt-get install --no-install-recommends -y \
#            llvm-dev \
#            libstdc++6:armhf libgcc1:armhf zlib1g:armhf \
#            libcfitsio-dev \
#            pkg-config \
#            libssl-dev \
#            cmake \
#            python3

      - name: Test the code
        uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: test
          args: --target armv7-unknown-linux-gnueabihf --manifest-path fitsio/Cargo.toml

      - name: Show directories with arm in the name
        if: always()
        run: ls / ; echo ; find /usr -iname '*arm*' -a -type d
